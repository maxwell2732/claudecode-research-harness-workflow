<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" fill="none">
  <defs>
    <filter id="shRv"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="640" height="220" rx="12" fill="#ffffff"/>
  <rect width="640" height="220" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Central review icon -->
  <g transform="translate(320, 40)">
    <circle cx="0" cy="0" r="24" fill="#FFF7ED" stroke="#F7931A" stroke-width="1.5"/>
    <path d="M-8 -2 L-2 4 L8 -6" fill="none" stroke="#F7931A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#F7931A" stroke-width="1" stroke-dasharray="3 2"/>
  </g>

  <text x="320" y="82" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="11" font-weight="700" fill="#1e293b">/harness-review</text>

  <!-- 4 perspective cards -->
  <!-- Security -->
  <g filter="url(#shRv)" transform="translate(24, 100)">
    <rect x="0" y="0" width="138" height="96" rx="8" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="22" cy="24" r="12" fill="#FFF7ED" stroke="#F7931A" stroke-width="1"/>
    <text x="22" y="28" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F7931A">&#x1F6E1;</text>
    <text x="42" y="28" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="11" font-weight="600" fill="#1e293b">セキュリティ</text>
    <text x="14" y="50" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">脆弱性検出</text>
    <text x="14" y="64" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">インジェクション</text>
    <text x="14" y="78" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">認証・秘密情報</text>
  </g>

  <!-- Performance -->
  <g filter="url(#shRv)" transform="translate(174, 100)">
    <rect x="0" y="0" width="138" height="96" rx="8" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="22" cy="24" r="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="1"/>
    <text x="22" y="28" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#EA580C">&#x26A1;</text>
    <text x="42" y="28" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="11" font-weight="600" fill="#1e293b">パフォーマンス</text>
    <text x="14" y="50" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">ボトルネック</text>
    <text x="14" y="64" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">メモリリーク</text>
    <text x="14" y="78" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">スケーリング</text>
  </g>

  <!-- Quality -->
  <g filter="url(#shRv)" transform="translate(324, 100)">
    <rect x="0" y="0" width="138" height="96" rx="8" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="22" cy="24" r="12" fill="#FFF7ED" stroke="#D97706" stroke-width="1"/>
    <text x="22" y="28" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#D97706">&#x2728;</text>
    <text x="42" y="28" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="11" font-weight="600" fill="#1e293b">品質</text>
    <text x="14" y="50" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">パターン</text>
    <text x="14" y="64" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">命名規則</text>
    <text x="14" y="78" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">保守性</text>
  </g>

  <!-- Accessibility -->
  <g filter="url(#shRv)" transform="translate(474, 100)">
    <rect x="0" y="0" width="138" height="96" rx="8" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="22" cy="24" r="12" fill="#FFF7ED" stroke="#B45309" stroke-width="1"/>
    <text x="22" y="28" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#B45309">&#x267F;</text>
    <text x="42" y="28" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="11" font-weight="600" fill="#1e293b">アクセシビリティ</text>
    <text x="14" y="50" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">WCAG準拠</text>
    <text x="14" y="64" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">スクリーンリーダー</text>
    <text x="14" y="78" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#64748b">キーボード操作</text>
  </g>

  <!-- Bottom text -->
  <text x="320" y="214" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="9" fill="#94a3b8">4つの視点。全変更をレビュー。コミット前の品質ゲート。</text>
</svg>